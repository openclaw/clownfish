name: cluster worker

run-name: cluster worker ${{ github.event.client_payload.dispatch_id || github.event.inputs.dispatch_id || github.event.inputs.job || 'manual' }}

on:
  repository_dispatch:
    types:
      - projectclownfish_worker
  workflow_dispatch:
    inputs:
      dispatch_id:
        description: "Optional idempotency id for a dispatcher retry"
        required: false
        default: ""
        type: string
      job:
        description: "Job markdown path, for example jobs/openclaw/inbox/cluster-001.md"
        required: true
        type: string
      mode:
        description: "Worker mode"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - execute
          - autonomous
      runner:
        description: "Runner label for cluster planning/review work"
        required: true
        default: ubuntu-latest
        type: string
      execution_runner:
        description: "Runner label for fix/apply execution work"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string
      model:
        description: "Codex model"
        required: true
        default: gpt-5.5
        type: string
      dry_run:
        description: "Render prompt and write a dry result without invoking Codex"
        required: true
        default: false
        type: boolean
      hydrate_comments:
        description: "Override CLOWNFISH_HYDRATE_COMMENTS for this run; leave blank to use repo vars"
        required: false
        default: ""
        type: string
      max_linked_refs:
        description: "Override CLOWNFISH_MAX_LINKED_REFS for this run; leave blank to use repo vars"
        required: false
        default: ""
        type: string
      max_comments_per_item:
        description: "Override CLOWNFISH_MAX_COMMENTS_PER_ITEM for this run; leave blank to use repo vars"
        required: false
        default: ""
        type: string
      max_review_comments_per_pr:
        description: "Override CLOWNFISH_MAX_REVIEW_COMMENTS_PER_PR for this run; leave blank to use repo vars"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: projectclownfish-${{ github.event.inputs.job || github.event.client_payload.job }}-${{ github.event.inputs.mode || github.event.client_payload.mode || 'plan' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare worker inputs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      job: ${{ steps.plan.outputs.job }}
      mode: ${{ steps.plan.outputs.mode }}
      runner: ${{ steps.plan.outputs.runner }}
      execution_runner: ${{ steps.plan.outputs.execution_runner }}
      model: ${{ steps.plan.outputs.model }}
      dry_run: ${{ steps.plan.outputs.dry_run }}
      hydrate_comments: ${{ steps.plan.outputs.hydrate_comments }}
      max_linked_refs: ${{ steps.plan.outputs.max_linked_refs }}
      max_comments_per_item: ${{ steps.plan.outputs.max_comments_per_item }}
      max_review_comments_per_pr: ${{ steps.plan.outputs.max_review_comments_per_pr }}
      allow_labels: ${{ steps.plan.outputs.allow_labels }}
      allow_execute: ${{ steps.plan.outputs.allow_execute }}
      allow_fix_pr: ${{ steps.plan.outputs.allow_fix_pr }}
      allow_merge: ${{ steps.plan.outputs.allow_merge }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Normalize worker inputs
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          INPUT_JOB: ${{ github.event.inputs.job || '' }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'plan' }}
          INPUT_RUNNER: ${{ github.event.inputs.runner || 'ubuntu-latest' }}
          INPUT_EXECUTION_RUNNER: ${{ github.event.inputs.execution_runner || 'blacksmith-16vcpu-ubuntu-2404' }}
          INPUT_MODEL: ${{ github.event.inputs.model || vars.CLOWNFISH_MODEL || 'gpt-5.5' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_HYDRATE_COMMENTS: ${{ github.event.inputs.hydrate_comments || '' }}
          INPUT_MAX_LINKED_REFS: ${{ github.event.inputs.max_linked_refs || '' }}
          INPUT_MAX_COMMENTS_PER_ITEM: ${{ github.event.inputs.max_comments_per_item || '' }}
          INPUT_MAX_REVIEW_COMMENTS_PER_PR: ${{ github.event.inputs.max_review_comments_per_pr || '' }}
          INPUT_ALLOW_EXECUTE: ${{ vars.CLOWNFISH_ALLOW_EXECUTE || '0' }}
          INPUT_ALLOW_FIX_PR: ${{ vars.CLOWNFISH_ALLOW_FIX_PR || '0' }}
          INPUT_ALLOW_MERGE: ${{ vars.CLOWNFISH_ALLOW_MERGE || '0' }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { execFileSync, spawnSync } from "node:child_process";
          import { parseJob, validateJob } from "./scripts/lib.mjs";

          const parsedPayload = JSON.parse(process.env.CLIENT_PAYLOAD || "{}");
          const payload = parsedPayload && typeof parsedPayload === "object" ? parsedPayload : {};
          const fromDispatch = process.env.EVENT_NAME === "repository_dispatch";
          const hydration = payload.hydration ?? {};

          const jobPath = String(fromDispatch ? payload.job ?? "" : process.env.INPUT_JOB ?? "");
          const mode = String(fromDispatch ? payload.mode ?? "plan" : process.env.INPUT_MODE ?? "plan");
          const runner = String(
            fromDispatch ? payload.runner ?? "ubuntu-latest" : process.env.INPUT_RUNNER,
          );
          const executionRunner = String(
            fromDispatch
              ? payload.execution_runner ?? "blacksmith-16vcpu-ubuntu-2404"
              : process.env.INPUT_EXECUTION_RUNNER,
          );
          const model = String(fromDispatch ? payload.model ?? "gpt-5.5" : process.env.INPUT_MODEL);
          const dryRun = String(fromDispatch ? payload.dry_run === true || payload.dry_run === "true" : process.env.INPUT_DRY_RUN === "true");
          const hydrateComments = String(
            fromDispatch
              ? hydration.hydrate_comments ?? payload.hydrate_comments ?? ""
              : process.env.INPUT_HYDRATE_COMMENTS ?? "",
          );
          const maxLinkedRefs = String(
            fromDispatch
              ? hydration.max_linked_refs ?? payload.max_linked_refs ?? ""
              : process.env.INPUT_MAX_LINKED_REFS ?? "",
          );
          const maxCommentsPerItem = String(
            fromDispatch
              ? hydration.max_comments_per_item ?? payload.max_comments_per_item ?? ""
              : process.env.INPUT_MAX_COMMENTS_PER_ITEM ?? "",
          );
          const maxReviewCommentsPerPr = String(
            fromDispatch
              ? hydration.max_review_comments_per_pr ?? payload.max_review_comments_per_pr ?? ""
              : process.env.INPUT_MAX_REVIEW_COMMENTS_PER_PR ?? "",
          );

          if (!jobPath.startsWith("jobs/") || !jobPath.endsWith(".md")) throw new Error(`invalid job path: ${jobPath}`);
          if (!["plan", "execute", "autonomous"].includes(mode)) throw new Error(`invalid mode: ${mode}`);
          for (const [name, value] of Object.entries({
            hydrate_comments: hydrateComments,
            max_linked_refs: maxLinkedRefs,
            max_comments_per_item: maxCommentsPerItem,
            max_review_comments_per_pr: maxReviewCommentsPerPr,
          })) {
            if (value !== "" && !/^\d+$/.test(value)) throw new Error(`invalid numeric override ${name}: ${value}`);
          }
          if (fromDispatch) {
            const ref = String(payload.ref ?? "main");
            if (ref !== "main") throw new Error(`repository_dispatch worker only supports ref=main for now, got ${ref}`);
            const requiredAncestor = String(payload.required_ancestor_sha ?? payload.min_head_sha ?? "");
            const expectedHead = String(payload.head_sha ?? "");
            const actualHead = execFileSync("git", ["rev-parse", "HEAD"], { encoding: "utf8" }).trim();
            if (requiredAncestor) {
              if (!/^[0-9a-f]{40,64}$/i.test(requiredAncestor)) {
                throw new Error(`invalid repository_dispatch required_ancestor_sha: ${requiredAncestor}`);
              }
            const isShallow = execFileSync("git", ["rev-parse", "--is-shallow-repository"], {
              encoding: "utf8",
            }).trim() === "true";
            const fetchMain = (args) => {
              const result = spawnSync("git", args, {
                encoding: "utf8",
                stdio: "pipe",
              });
              if (result.status !== 0) {
                throw new Error(`failed to fetch origin/main: ${String(result.stderr ?? "").trim()}`);
              }
            };
            fetchMain(["fetch", "--no-tags", ...(isShallow ? ["--deepen=250"] : []), "origin", "main"]);
            let ancestorCheck = spawnSync("git", ["merge-base", "--is-ancestor", requiredAncestor, "HEAD"], {
              encoding: "utf8",
              stdio: "pipe",
            });
            if (ancestorCheck.status !== 0 && isShallow) {
              fetchMain(["fetch", "--no-tags", "--unshallow", "origin", "main"]);
              ancestorCheck = spawnSync("git", ["merge-base", "--is-ancestor", requiredAncestor, "HEAD"], {
                encoding: "utf8",
                stdio: "pipe",
              });
            }
            if (ancestorCheck.status !== 0) {
              throw new Error(
                `stale repository_dispatch required_ancestor_sha ${requiredAncestor}; workflow checked out ${actualHead}`,
                );
              }
            } else if (expectedHead && expectedHead !== actualHead) {
              throw new Error(`stale repository_dispatch head_sha ${expectedHead}; workflow checked out ${actualHead}`);
            } else if (!expectedHead) {
              throw new Error("repository_dispatch worker requires required_ancestor_sha or legacy head_sha");
            }
          }

          const job = parseJob(jobPath);
          const errors = validateJob(job);
          if (errors.length > 0) throw new Error(`invalid job ${jobPath}: ${errors.join("; ")}`);
          const allowedActions = new Set(job.frontmatter.allowed_actions ?? []);
          const blockedActions = new Set(job.frontmatter.blocked_actions ?? []);
          const allowLabels = allowedActions.has("label") && !blockedActions.has("label");
          const writeMode = ["execute", "autonomous"].includes(mode) && dryRun !== "true";
          const allowExecute = writeMode && process.env.INPUT_ALLOW_EXECUTE === "1" ? "1" : "0";
          const allowFixPr = writeMode && process.env.INPUT_ALLOW_FIX_PR === "1" ? "1" : "0";
          const allowMerge = writeMode && process.env.INPUT_ALLOW_MERGE === "1" ? "1" : "0";

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `job=${job.relativePath}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `mode=${mode}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `runner=${runner}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `execution_runner=${executionRunner}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `model=${model}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `dry_run=${dryRun}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `hydrate_comments=${hydrateComments}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `max_linked_refs=${maxLinkedRefs}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `max_comments_per_item=${maxCommentsPerItem}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `max_review_comments_per_pr=${maxReviewCommentsPerPr}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `allow_labels=${allowLabels ? "1" : "0"}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `allow_execute=${allowExecute}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `allow_fix_pr=${allowFixPr}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `allow_merge=${allowMerge}\n`);
          NODE

  cluster:
    name: Plan and review cluster
    needs: prepare
    runs-on: ${{ needs.prepare.outputs.runner }}
    timeout-minutes: 90
    outputs:
      allow_execute: ${{ steps.capture_gates.outputs.allow_execute }}
      allow_fix_pr: ${{ steps.capture_gates.outputs.allow_fix_pr }}
      allow_merge: ${{ steps.capture_gates.outputs.allow_merge }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
      CLOWNFISH_ALLOWED_OWNER: ${{ vars.CLOWNFISH_ALLOWED_OWNER || 'openclaw' }}
      CLOWNFISH_ALLOW_EXECUTE: ${{ needs.prepare.outputs.allow_execute }}
      CLOWNFISH_ALLOW_FIX_PR: ${{ needs.prepare.outputs.allow_fix_pr }}
      CLOWNFISH_ALLOW_MERGE: ${{ needs.prepare.outputs.allow_merge }}
      CLOWNFISH_HYDRATE_CLUSTER_REFS: ${{ vars.CLOWNFISH_HYDRATE_CLUSTER_REFS || '1' }}
      CLOWNFISH_HYDRATE_COMMENTS: ${{ needs.prepare.outputs.hydrate_comments != '' && needs.prepare.outputs.hydrate_comments || vars.CLOWNFISH_HYDRATE_COMMENTS || '1' }}
      CLOWNFISH_MAX_COMMENTS_PER_ITEM: ${{ needs.prepare.outputs.max_comments_per_item != '' && needs.prepare.outputs.max_comments_per_item || vars.CLOWNFISH_MAX_COMMENTS_PER_ITEM || '30' }}
      CLOWNFISH_MAX_LINKED_REFS: ${{ needs.prepare.outputs.max_linked_refs != '' && needs.prepare.outputs.max_linked_refs || vars.CLOWNFISH_MAX_LINKED_REFS || '20' }}
      CLOWNFISH_MAX_REVIEW_COMMENTS_PER_PR: ${{ needs.prepare.outputs.max_review_comments_per_pr != '' && needs.prepare.outputs.max_review_comments_per_pr || vars.CLOWNFISH_MAX_REVIEW_COMMENTS_PER_PR || '50' }}
      CLOWNFISH_CODEX_TIMEOUT_MS: ${{ vars.CLOWNFISH_CODEX_TIMEOUT_MS || '1800000' }}
      CLOWNFISH_CODEX_REASONING_EFFORT: ${{ vars.CLOWNFISH_CODEX_REASONING_EFFORT || 'medium' }}
      CLOWNFISH_MODEL: ${{ needs.prepare.outputs.model }}
      CODEX_CLI_VERSION: ${{ vars.CLOWNFISH_CODEX_CLI_VERSION || '0.125.0' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub App token
        id: app_token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CLOWNFISH_APP_ID }}
          private-key: ${{ secrets.CLOWNFISH_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLOWNFISH_ALLOWED_OWNER || github.repository_owner }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Capture execution gates
        id: capture_gates
        run: |
          {
            echo "allow_execute=${CLOWNFISH_ALLOW_EXECUTE}"
            echo "allow_fix_pr=${CLOWNFISH_ALLOW_FIX_PR}"
            echo "allow_merge=${CLOWNFISH_ALLOW_MERGE}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Codex CLI and npm downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.projectclownfish/codex
          key: ${{ runner.os }}-node24-codex-${{ env.CODEX_CLI_VERSION }}-v1
          restore-keys: |
            ${{ runner.os }}-node24-codex-

      - name: Select GitHub read token
        env:
          CLOWNFISH_APP_GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLOWNFISH_READ_GH_TOKEN: ${{ secrets.CLOWNFISH_READ_GH_TOKEN }}
          CLOWNFISH_WRITE_GH_TOKEN: ${{ secrets.CLOWNFISH_GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          summarize_gh_error() {
            if [ ! -s /tmp/clownfish-gh-token-check.err ]; then
              return 0
            fi
            head -n 5 /tmp/clownfish-gh-token-check.err |
              sed -E \
                -e 's/(authorization|bearer|token)[^[:space:]]+/\1=[redacted]/Ig' \
                -e 's/[A-Za-z0-9_=-]{40,}/[redacted]/g'
          }
          for candidate in CLOWNFISH_READ_GH_TOKEN GITHUB_TOKEN CLOWNFISH_WRITE_GH_TOKEN CLOWNFISH_APP_GH_TOKEN; do
            token="${!candidate:-}"
            if [ -z "$token" ]; then
              continue
            fi
            if GH_TOKEN="$token" gh api "repos/${CLOWNFISH_ALLOWED_OWNER}/openclaw" --jq .full_name >/dev/null 2>/tmp/clownfish-gh-token-check.err; then
              echo "GH_TOKEN=$token" >> "$GITHUB_ENV"
              echo "selected $candidate for GitHub read access"
              exit 0
            fi
            echo "::warning::$candidate failed GitHub read probe"
            summarize_gh_error || true
          done
          echo "no GitHub token could read repos/${CLOWNFISH_ALLOWED_OWNER}/openclaw"
          exit 1

      - name: Install Codex CLI
        run: |
          set -euo pipefail
          npm config set prefix "$HOME/.projectclownfish/codex"
          npm config set cache "$HOME/.npm"
          echo "$HOME/.projectclownfish/codex/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.projectclownfish/codex/bin:$PATH"

          if ! command -v codex >/dev/null 2>&1 || ! codex --version | grep -Fq "$CODEX_CLI_VERSION"; then
            npm install -g "@openai/codex@$CODEX_CLI_VERSION" --prefer-offline --no-audit --no-fund
          fi
          codex --version

      - name: Authenticate Codex
        run: |
          test -n "${OPENAI_API_KEY:-}"
          test -n "${CODEX_API_KEY:-}"
          printenv OPENAI_API_KEY | codex login --with-api-key >/dev/null

      - name: Validate job
        run: npm run validate:job -- "${{ needs.prepare.outputs.job }}"

      - name: Prepare target checkout
        if: ${{ (needs.prepare.outputs.mode == 'execute' || needs.prepare.outputs.mode == 'autonomous') && needs.prepare.outputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          target_repo="$(node --input-type=module -e 'import { parseJob } from "./scripts/lib.mjs"; console.log(parseJob(process.argv[1]).frontmatter.repo);' "${{ needs.prepare.outputs.job }}")"
          target_dir=".projectclownfish/target/${target_repo//\//-}"
          rm -rf "$target_dir"
          repo_url="https://github.com/${target_repo}.git"
          if [ -n "${GH_TOKEN:-}" ]; then
            auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" clone --depth=1 "$repo_url" "$target_dir"
          else
            git clone --depth=1 "$repo_url" "$target_dir"
          fi
          echo "CLOWNFISH_TARGET_CHECKOUT=$target_dir" >> "$GITHUB_ENV"
          echo "prepared target checkout for $target_repo at $target_dir"

      - name: Run worker
        run: |
          worker_mode="${{ needs.prepare.outputs.mode }}"
          if [ "$worker_mode" != "plan" ] && [ "${CLOWNFISH_ALLOW_EXECUTE}" != "1" ]; then
            echo "CLOWNFISH_ALLOW_EXECUTE is not explicitly 1; rendering plan-only output for requested $worker_mode run"
            worker_mode="plan"
          fi
          args=("${{ needs.prepare.outputs.job }}" --mode "$worker_mode")
          if [ "${{ needs.prepare.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          npm run worker -- "${args[@]}"

      - name: Review worker result
        if: always()
        run: |
          if find .projectclownfish/runs -name result.json -print -quit | grep -q .; then
            npm run review-results -- .projectclownfish/runs
          fi

      - name: Upload worker transfer artifacts
        if: ${{ always() && (needs.prepare.outputs.mode == 'execute' || needs.prepare.outputs.mode == 'autonomous') && needs.prepare.outputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: projectclownfish-worker-${{ github.run_id }}-${{ github.run_attempt }}
          path: .projectclownfish/runs
          if-no-files-found: warn

      - name: Upload final worker artifacts
        if: ${{ always() && (!((needs.prepare.outputs.mode == 'execute' || needs.prepare.outputs.mode == 'autonomous') && needs.prepare.outputs.dry_run != 'true') || failure() || cancelled()) }}
        uses: actions/upload-artifact@v7
        with:
          name: projectclownfish-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .projectclownfish/runs/**
          if-no-files-found: warn

  execute:
    name: Execute and apply cluster actions
    needs:
      - prepare
      - cluster
    if: ${{ needs.cluster.result == 'success' && (needs.prepare.outputs.mode == 'execute' || needs.prepare.outputs.mode == 'autonomous') && needs.prepare.outputs.dry_run != 'true' }}
    runs-on: ${{ needs.prepare.outputs.execution_runner }}
    timeout-minutes: 60
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
      CLOWNFISH_ALLOWED_OWNER: ${{ vars.CLOWNFISH_ALLOWED_OWNER || 'openclaw' }}
      CLOWNFISH_ALLOW_EXECUTE: ${{ needs.cluster.outputs.allow_execute == '1' && '1' || '0' }}
      CLOWNFISH_ALLOW_FIX_PR: ${{ needs.cluster.outputs.allow_fix_pr == '1' && '1' || '0' }}
      CLOWNFISH_ALLOW_MERGE: ${{ needs.cluster.outputs.allow_merge || '0' }}
      CLOWNFISH_CODEX_REASONING_EFFORT: ${{ vars.CLOWNFISH_CODEX_REASONING_EFFORT || 'medium' }}
      CLOWNFISH_CODEX_REVIEW_ATTEMPTS: ${{ vars.CLOWNFISH_CODEX_REVIEW_ATTEMPTS || '2' }}
      CLOWNFISH_REBASE_REPAIR_ATTEMPTS: ${{ vars.CLOWNFISH_REBASE_REPAIR_ATTEMPTS || '4' }}
      CLOWNFISH_ALLOW_REBASED_FORK_REPAIR: ${{ vars.CLOWNFISH_ALLOW_REBASED_FORK_REPAIR || '0' }}
      CLOWNFISH_FIX_CODEX_TIMEOUT_MS: ${{ vars.CLOWNFISH_FIX_CODEX_TIMEOUT_MS || '1200000' }}
      CLOWNFISH_FIX_STEP_TIMEOUT_MS: ${{ vars.CLOWNFISH_FIX_STEP_TIMEOUT_MS || '2400000' }}
      CLOWNFISH_REBASE_ONLY_FIX_STEP_TIMEOUT_MS: ${{ vars.CLOWNFISH_REBASE_ONLY_FIX_STEP_TIMEOUT_MS || '1500000' }}
      CLOWNFISH_REBASE_ONLY_REVIEW_TIMEOUT_MS: ${{ vars.CLOWNFISH_REBASE_ONLY_REVIEW_TIMEOUT_MS || '300000' }}
      CLOWNFISH_FIX_TIMEOUT_RESERVE_MS: ${{ vars.CLOWNFISH_FIX_TIMEOUT_RESERVE_MS || '300000' }}
      CLOWNFISH_FIX_FETCH_TIMEOUT_MS: ${{ vars.CLOWNFISH_FIX_FETCH_TIMEOUT_MS || '120000' }}
      CLOWNFISH_FIX_FETCH_ATTEMPTS: ${{ vars.CLOWNFISH_FIX_FETCH_ATTEMPTS || '2' }}
      CLOWNFISH_FIX_PREFLIGHT_TIMEOUT_MS: ${{ vars.CLOWNFISH_FIX_PREFLIGHT_TIMEOUT_MS || '120000' }}
      CLOWNFISH_RESOLVE_REVIEW_THREADS: ${{ vars.CLOWNFISH_RESOLVE_REVIEW_THREADS || '1' }}
      CLOWNFISH_MODEL: ${{ needs.prepare.outputs.model }}
      CLOWNFISH_TARGET_VALIDATION_MODE: ${{ vars.CLOWNFISH_TARGET_VALIDATION_MODE || 'changed-only' }}
      CLOWNFISH_POST_FLIGHT_IGNORE_CHECKS: ${{ vars.CLOWNFISH_POST_FLIGHT_IGNORE_CHECKS || 'auto-response,Labeler,Stale' }}
      CLOWNFISH_MAX_ACTIVE_PRS_PER_AREA: ${{ vars.CLOWNFISH_MAX_ACTIVE_PRS_PER_AREA || '50' }}
      CLOWNFISH_CLOSE_SUPERSEDED_SOURCE_PRS: ${{ vars.CLOWNFISH_CLOSE_SUPERSEDED_SOURCE_PRS || '0' }}
      CLOWNFISH_GIT_USER_NAME: ${{ vars.CLOWNFISH_GIT_USER_NAME || 'projectclownfish' }}
      CLOWNFISH_GIT_USER_EMAIL: ${{ vars.CLOWNFISH_GIT_USER_EMAIL || 'projectclownfish@users.noreply.github.com' }}
      CODEX_CLI_VERSION: ${{ vars.CLOWNFISH_CODEX_CLI_VERSION || '0.125.0' }}
      OPENCLAW_LOCAL_CHECK: "0"
      CLOWNFISH_READ_GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub App token
        id: app_token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CLOWNFISH_APP_ID }}
          private-key: ${{ secrets.CLOWNFISH_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLOWNFISH_ALLOWED_OWNER || github.repository_owner }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Create workflow-capable GitHub App token
        id: workflow_app_token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CLOWNFISH_APP_ID }}
          private-key: ${{ secrets.CLOWNFISH_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLOWNFISH_ALLOWED_OWNER || github.repository_owner }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Select GitHub write token
        env:
          CLOWNFISH_APP_GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLOWNFISH_WORKFLOW_APP_GH_TOKEN: ${{ steps.workflow_app_token.outputs.token }}
          CLOWNFISH_WRITE_GH_TOKEN: ${{ secrets.CLOWNFISH_GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          summarize_gh_error() {
            if [ ! -s /tmp/clownfish-gh-token-check.err ]; then
              return 0
            fi
            head -n 5 /tmp/clownfish-gh-token-check.err |
              sed -E \
                -e 's/(authorization|bearer|token)[^[:space:]]+/\1=[redacted]/Ig' \
                -e 's/[A-Za-z0-9_=-]{40,}/[redacted]/g'
          }
          for candidate in CLOWNFISH_WRITE_GH_TOKEN CLOWNFISH_WORKFLOW_APP_GH_TOKEN CLOWNFISH_APP_GH_TOKEN GITHUB_TOKEN; do
            token="${!candidate:-}"
            if [ -z "$token" ]; then
              continue
            fi
            if full_name="$(GH_TOKEN="$token" gh api "repos/${CLOWNFISH_ALLOWED_OWNER}/openclaw" \
              --jq 'select((.permissions.push // false) or (.permissions.maintain // false) or (.permissions.admin // false)) | .full_name' \
              2>/tmp/clownfish-gh-token-check.err)" && [ -n "$full_name" ]; then
              echo "GH_TOKEN=$token" >> "$GITHUB_ENV"
              echo "selected $candidate for GitHub write/apply access"
              exit 0
            fi
            echo "::warning::$candidate failed GitHub write/apply probe"
            summarize_gh_error || true
          done
          echo "no GitHub token could reach repos/${CLOWNFISH_ALLOWED_OWNER}/openclaw"
          exit 1

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Codex CLI, npm, and target pnpm downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.cache/node/corepack
            ~/.local/share/pnpm/store
            ~/.projectclownfish/codex
          key: ${{ runner.os }}-node24-codex-${{ env.CODEX_CLI_VERSION }}-target-pnpm-v1
          restore-keys: |
            ${{ runner.os }}-node24-codex-${{ env.CODEX_CLI_VERSION }}-target-pnpm-
            ${{ runner.os }}-node24-codex-

      - name: Install Codex CLI
        run: |
          set -euo pipefail
          npm config set prefix "$HOME/.projectclownfish/codex"
          npm config set cache "$HOME/.npm"
          echo "$HOME/.projectclownfish/codex/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.projectclownfish/codex/bin:$PATH"

          if ! command -v codex >/dev/null 2>&1 || ! codex --version | grep -Fq "$CODEX_CLI_VERSION"; then
            npm install -g "@openai/codex@$CODEX_CLI_VERSION" --prefer-offline --no-audit --no-fund
          fi
          codex --version

      - name: Authenticate Codex
        run: |
          test -n "${OPENAI_API_KEY:-}"
          test -n "${CODEX_API_KEY:-}"
          printenv OPENAI_API_KEY | codex login --with-api-key >/dev/null

      - name: Download worker artifacts
        uses: actions/download-artifact@v8
        with:
          name: projectclownfish-worker-${{ github.run_id }}-${{ github.run_attempt }}
          path: .projectclownfish/runs

      - name: Validate job
        run: npm run validate:job -- "${{ needs.prepare.outputs.job }}"

      - name: Execute credited fix artifact
        if: ${{ env.CLOWNFISH_ALLOW_EXECUTE == '1' && env.CLOWNFISH_ALLOW_FIX_PR == '1' }}
        timeout-minutes: 50
        run: npm run execute-fix -- "${{ needs.prepare.outputs.job }}" --latest

      - name: Apply safe closure actions
        if: ${{ env.CLOWNFISH_ALLOW_EXECUTE == '1' }}
        run: npm run apply-result -- "${{ needs.prepare.outputs.job }}" --latest

      - name: Post-flight finalize fix PRs
        if: ${{ env.CLOWNFISH_ALLOW_EXECUTE == '1' && env.CLOWNFISH_ALLOW_FIX_PR == '1' }}
        run: npm run post-flight -- "${{ needs.prepare.outputs.job }}" --latest

      - name: Apply post-flight closeouts
        if: ${{ env.CLOWNFISH_ALLOW_EXECUTE == '1' }}
        run: npm run apply-result -- "${{ needs.prepare.outputs.job }}" --latest

      - name: Tag Clownfish targets
        if: ${{ always() && env.CLOWNFISH_ALLOW_EXECUTE == '1' && needs.prepare.outputs.allow_labels == '1' }}
        run: npm run tag-clownfish -- .projectclownfish/runs --apply --live --open-branches false --report .projectclownfish/runs/clownfish-label-report.json

      - name: Upload final worker artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: projectclownfish-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .projectclownfish/runs/**
          if-no-files-found: warn
