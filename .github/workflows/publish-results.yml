name: publish cluster results

on:
  workflow_run:
    workflows:
      - cluster worker
    types:
      - completed

permissions:
  contents: write
  actions: read

concurrency:
  group: projectclownfish-publish-results
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download worker artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          mkdir -p artifacts
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --dir artifacts

      - name: Publish result ledger
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          npm run publish-result -- artifacts \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL" \
            --head-sha "$HEAD_SHA" \
            --conclusion "$CONCLUSION"

      - name: Commit result ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md results closed apply-report.json
          if git diff --cached --quiet; then
            echo "No result changes"
            exit 0
          fi
          git commit -m "chore: publish cluster result"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            git fetch origin main
            git rebase -X theirs origin/main
          done
          git push
