name: publish cluster results

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional cluster-worker run id to include first
        required: false
        default: ""
      run_attempt:
        description: Run attempt for run_id
        required: false
        default: "1"
      limit:
        description: Maximum missing worker results to backfill
        required: false
        default: "200"
      lookback:
        description: Number of cluster-worker runs to inspect
        required: false
        default: "1200"
      conclusion:
        description: GitHub Actions conclusion to include, or any
        required: false
        default: "success"
      order:
        description: newest or oldest missing runs first
        required: false
        default: "newest"
      aggregate:
        description: Also rebuild dashboard and finalize open PRs
        required: false
        default: "false"
  workflow_run:
    workflows:
      - cluster worker
      - cluster batch
    types:
      - completed

permissions:
  contents: write
  actions: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: projectclownfish-publish-results
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download worker artifacts
        id: download-artifacts
        env:
          GH_TOKEN: ${{ secrets.CLOWNFISH_READ_GH_TOKEN || secrets.CLOWNFISH_GH_TOKEN || github.token }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt || github.event.inputs.run_attempt || '1' }}
          BACKFILL_LIMIT: ${{ github.event.inputs.limit || vars.CLOWNFISH_PUBLISH_BACKFILL_LIMIT || '250' }}
          BACKFILL_LOOKBACK: ${{ github.event.inputs.lookback || vars.CLOWNFISH_PUBLISH_BACKFILL_LOOKBACK || '1200' }}
          BACKFILL_CONCLUSION: ${{ github.event.inputs.conclusion || 'success' }}
          BACKFILL_ORDER: ${{ github.event.inputs.order || 'newest' }}
          BACKFILL_WORKFLOW: ${{ github.event.workflow_run.name == 'cluster batch' && 'cluster-batch.yml' || 'cluster-worker.yml' }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          rm -rf artifacts
          args=(
            --repo "$GITHUB_REPOSITORY"
            --workflow "$BACKFILL_WORKFLOW"
            --conclusion "$BACKFILL_CONCLUSION"
            --limit "$BACKFILL_LIMIT"
            --lookback "$BACKFILL_LOOKBACK"
            --order "$BACKFILL_ORDER"
            --out artifacts
            --runs-json artifacts/runs.json
            --allow-partial
          )
          if [ -n "${RUN_ID:-}" ]; then
            args+=(--run-id "$RUN_ID" --run-attempt "${RUN_ATTEMPT:-1}")
          fi
          npm run backfill-results -- "${args[@]}"
          if node -e 'const fs=require("node:fs"); const rows=JSON.parse(fs.readFileSync("artifacts/runs.json","utf8")); process.exit(rows.length === 0 ? 0 : 1)'; then
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            echo "No missing cluster results to publish"
            exit 0
          fi
          set +e
          node scripts/review-results.mjs artifacts > artifacts/review-results.json
          review_status=$?
          set -e
          if [ "$review_status" -ne 0 ]; then
            npm run filter-reviewed-artifacts -- artifacts \
              --review-report artifacts/review-results.json \
              --runs-json artifacts/runs.json
            if node -e 'const fs=require("node:fs"); const rows=JSON.parse(fs.readFileSync("artifacts/runs.json","utf8")); process.exit(rows.length === 0 ? 0 : 1)'; then
              if node -e 'const fs=require("node:fs"); const rows=JSON.parse(fs.readFileSync("artifacts/review-terminal.json","utf8")).rejections; process.exit(Array.isArray(rows) && rows.length > 0 ? 1 : 0)'; then
                echo "has_results=false" >> "$GITHUB_OUTPUT"
                echo "No review-passing cluster results or terminal rejections to publish"
                exit 0
              fi
              echo "has_results=true" >> "$GITHUB_OUTPUT"
              echo "Publishing terminal review rejections without normal result artifacts"
              exit 0
            fi
            set +e
            node scripts/review-results.mjs artifacts > artifacts/review-results.filtered.json
            review_status=$?
            set -e
            if [ "$review_status" -ne 0 ]; then
              cat artifacts/review-results.filtered.json
              exit "$review_status"
            fi
          fi
          if node -e 'const fs=require("node:fs"); const rows=JSON.parse(fs.readFileSync("artifacts/runs.json","utf8")); process.exit(rows.length === 0 ? 0 : 1)'; then
            if node -e 'const fs=require("node:fs"); const rows=fs.existsSync("artifacts/review-terminal.json") ? JSON.parse(fs.readFileSync("artifacts/review-terminal.json","utf8")).rejections : []; process.exit(Array.isArray(rows) && rows.length > 0 ? 1 : 0)'; then
              echo "has_results=false" >> "$GITHUB_OUTPUT"
              echo "No review-passing cluster results or terminal rejections to publish"
              exit 0
            fi
          fi
          echo "has_results=true" >> "$GITHUB_OUTPUT"

      - name: Publish and commit result ledger
        if: steps.download-artifacts.outputs.has_results == 'true'
        env:
          GH_TOKEN: ${{ secrets.CLOWNFISH_READ_GH_TOKEN || secrets.CLOWNFISH_GH_TOKEN || github.token }}
          PUBLISH_AGGREGATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aggregate || 'false' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B main origin/main
          publish_args=(artifacts --runs-json artifacts/runs.json --review-terminal artifacts/review-terminal.json)
          if [ "$PUBLISH_AGGREGATE" != "true" ]; then
            publish_args+=(--skip-aggregate)
          fi
          npm run publish-result -- "${publish_args[@]}"
          if [ "$PUBLISH_AGGREGATE" = "true" ]; then
            npm run finalize-open-prs -- --write-report
            npm run publish-result
          fi
          git add README.md results jobs/openclaw/closed apply-report.json
          if git diff --cached --quiet; then
            echo "No result changes"
            exit 0
          fi
          git commit -m "chore: publish cluster result"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing existing ledger commit onto origin/main"
            git fetch origin main
            if git rebase origin/main; then
              continue
            fi
            git rebase --abort || true
            exit 1
          done
          exit 1
