name: daily checks-success preflight intake

run-name: daily checks-success preflight intake

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository whose open checks-success PRs should be scanned"
        required: true
        default: openclaw/openclaw
        type: string
      limit:
        description: "Maximum PR candidates to enqueue"
        required: true
        default: "30"
        type: string
      batch_size:
        description: "PRs per committed source shard"
        required: true
        default: "2"
        type: string
      runner:
        description: "Runner for external merge preflight and guarded apply"
        required: true
        default: ubuntu-latest
        type: string
      apply:
        description: "Dispatch guarded apply after preflight passes"
        required: true
        default: true
        type: boolean

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: checks-success-preflight-intake-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NO_COLOR: "1"
  CLICOLOR: "0"

jobs:
  intake:
    if: ${{ github.event_name != 'schedule' || vars.CLOWNFISH_CHECKS_SUCCESS_PREFLIGHT_ENABLED == '' || vars.CLOWNFISH_CHECKS_SUCCESS_PREFLIGHT_ENABLED != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create GitHub App token
        id: app_token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CLOWNFISH_APP_ID }}
          private-key: ${{ secrets.CLOWNFISH_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLOWNFISH_ALLOWED_OWNER || github.repository_owner }}
          permission-actions: write
          permission-contents: write
          permission-pull-requests: read

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token || github.token }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Generate checks-success preflight shards
        id: intake
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.CLOWNFISH_GH_TOKEN || github.token }}
          CLOWNFISH_GH_BIN: gh
          TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || vars.CLOWNFISH_TARGET_REPO || 'openclaw/openclaw' }}
          LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || vars.CLOWNFISH_CHECKS_SUCCESS_LIMIT || '30' }}
          BATCH_SIZE: ${{ github.event_name == 'workflow_dispatch' && inputs.batch_size || vars.CLOWNFISH_CHECKS_SUCCESS_BATCH_SIZE || '2' }}
          IMPORT_JSON: ${{ runner.temp }}/checks-success-import.json
          GENERATED_PATHS: ${{ runner.temp }}/checks-success-generated-paths.txt
          DISPATCH_TSV: ${{ runner.temp }}/checks-success-dispatch.tsv
        run: |
          set -euo pipefail
          node scripts/import-github-pr-inventory.mjs \
            --repo "$TARGET_REPO" \
            --mode autonomous \
            --strategy remediation \
            --checks-success \
            --refresh-stale-checks-success-branches \
            --sort recent \
            --limit "$LIMIT" \
            --batch-size "$BATCH_SIZE" \
            --json > "$IMPORT_JSON"

          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const payload = JSON.parse(fs.readFileSync(process.env.IMPORT_JSON, "utf8"));
          const generated = Array.isArray(payload.generated) ? payload.generated : [];
          const paths = generated.map((item) => String(item.path ?? "")).filter(Boolean);
          const rows = [];
          for (const item of generated) {
            const sourceJob = String(item.path ?? "");
            if (!sourceJob) continue;
            for (const ref of item.candidates ?? []) {
              const pullRequest = String(ref).replace(/^#/, "");
              if (/^\d+$/.test(pullRequest)) rows.push(`${sourceJob}\t${pullRequest}`);
            }
          }

          fs.writeFileSync(process.env.GENERATED_PATHS, paths.join("\n") + (paths.length ? "\n" : ""));
          fs.writeFileSync(process.env.DISPATCH_TSV, rows.join("\n") + (rows.length ? "\n" : ""));

          const output = [
            ["generated_count", String(paths.length)],
            ["candidate_count", String(payload?.totals?.candidates ?? rows.length)],
            ["dispatch_count", String(rows.length)],
          ];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, output.map(([key, value]) => `${key}=${value}`).join("\n") + "\n");
          console.log(`generated ${paths.length} source shard(s), ${rows.length} external preflight dispatch(es)`);
          EOF

      - name: Commit generated source shards
        if: ${{ steps.intake.outputs.generated_count != '0' }}
        run: |
          set -euo pipefail
          git config user.name "${{ vars.CLOWNFISH_GIT_USER_NAME || 'github-actions[bot]' }}"
          git config user.email "${{ vars.CLOWNFISH_GIT_USER_EMAIL || '41898282+github-actions[bot]@users.noreply.github.com' }}"
          while IFS= read -r generated_path; do
            if [ -n "$generated_path" ]; then
              git add "$generated_path"
            fi
          done < "${{ runner.temp }}/checks-success-generated-paths.txt"

          if git diff --cached --quiet; then
            echo "No generated checks-success shards to commit"
            exit 0
          fi

          git commit -m "chore: add daily checks-success preflight jobs"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}"
            if git push; then
              exit 0
            fi
            git fetch origin main
            git rebase -X theirs origin/main
          done
          git push

      - name: Dispatch external merge preflights
        if: ${{ steps.intake.outputs.dispatch_count != '0' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
          PREFLIGHT_RUNNER: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || vars.CLOWNFISH_CHECKS_SUCCESS_RUNNER || 'ubuntu-latest' }}
          DISPATCH_DELAY_SECONDS: ${{ vars.CLOWNFISH_CHECKS_SUCCESS_DISPATCH_DELAY_SECONDS || '5' }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            apply="${{ inputs.apply }}"
          else
            apply="${{ vars.CLOWNFISH_CHECKS_SUCCESS_APPLY || 'true' }}"
          fi

          while IFS=$'\t' read -r source_job pull_request; do
            if [ -z "$source_job" ] || [ -z "$pull_request" ]; then
              continue
            fi
            echo "Dispatching external preflight for ${source_job} #${pull_request}"
            gh workflow run external-merge-preflight.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref main \
              -f "source_job=${source_job}" \
              -f "pull_request=${pull_request}" \
              -f "runner=${PREFLIGHT_RUNNER}" \
              -f "apply=${apply}"
            sleep "$DISPATCH_DELAY_SECONDS"
          done < "${{ runner.temp }}/checks-success-dispatch.tsv"
